name: Weekly Earnings + New High Screener

on:
  schedule:
    # 매주 토요일 08:00 KST = 금요일 23:00 UTC
    - cron: '0 23 * * 5'
  workflow_dispatch:   # 수동 실행 버튼 (테스트용)

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests finance-datareader opendartreader lxml beautifulsoup4

      - name: Run screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_SCREENER: ${{ secrets.TELEGRAM_CHAT_ID_SCREENER }}
        run: python weekly_screener.py
